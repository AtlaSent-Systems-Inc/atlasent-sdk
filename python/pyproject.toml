[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "atlasent"
version = "0.1.0"
description = "Python SDK for AtlaSent authorization"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
dependencies = [
    "httpx>=0.25.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.23",
    "pytest-httpx>=0.30",
    "mypy>=1.0",
    "ruff>=0.1",
]

[project.urls]
Homepage = "https://atlasent.io"
Repository = "https://github.com/atlasent-systems-inc/atlasent-sdk-python"
Documentation = "https://docs.atlasent.io"

[tool.hatch.build.targets.wheel]
packages = ["atlasent"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.mypy]
strict = true

[tool.ruff]
target-version = "py39"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
