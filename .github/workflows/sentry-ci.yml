name: sentry-preview CI

# Adapter sub-package CI — see CI_GAPS_AUDIT.md.
# Mirrors enforce-ci.yml's per-language structure.

on:
  push:
    branches: [main]
    paths:
      - "typescript/packages/sentry/**"
      - "python/atlasent_sentry_preview/**"
      - ".github/workflows/sentry-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "typescript/packages/sentry/**"
      - "python/atlasent_sentry_preview/**"
      - ".github/workflows/sentry-ci.yml"

jobs:
  typescript:
    name: TypeScript @atlasent/sentry
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20.x", "22.x"]
    defaults:
      run:
        working-directory: typescript/packages/sentry
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: typescript/packages/sentry/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  python:
    name: Python atlasent-sentry-preview
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: python/atlasent_sentry_preview
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        run: pytest tests/ -v
