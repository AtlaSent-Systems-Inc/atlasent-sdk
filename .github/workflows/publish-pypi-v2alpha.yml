name: Publish atlasent-v2-alpha to PyPI

# Triggers on python-v2-alpha-v* tags (e.g. python-v2-alpha-v2.0.0a1).
# Release procedure: see /RELEASING.md, section "v2-alpha packages".
on:
  push:
    tags:
      - "python-v2-alpha-v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test before publishing
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: python/atlasent_v2_alpha
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    needs: test
    environment: pypi
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: python/atlasent_v2_alpha
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade build twine "packaging>=24.2"

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/python-v2-alpha-v}"
          PKG_VERSION="$(python -c '
          import tomllib
          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)
          print(data["project"]["version"])
          ')"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match pyproject.toml version ($PKG_VERSION)."
            exit 1
          fi
          echo "Tag and package version agree: $PKG_VERSION"

      - name: Build distribution packages
        run: python -m build

      - name: Check distribution packages
        run: twine check dist/*

      - name: Smoke-test built wheel
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install --upgrade pip
          /tmp/smoke/bin/pip install dist/*.whl
          SMOKE_VERSION="$(/tmp/smoke/bin/python -c 'import atlasent_v2_alpha; print(atlasent_v2_alpha.__version__)')"
          EXPECTED="${GITHUB_REF#refs/tags/python-v2-alpha-v}"
          if [ "$SMOKE_VERSION" != "$EXPECTED" ]; then
            echo "::error::Installed wheel reports $SMOKE_VERSION, expected $EXPECTED."
            exit 1
          fi
          /tmp/smoke/bin/python -c '
          from atlasent_v2_alpha import (
              AtlaSentV2Client, V2Error,
              ConsumeRequest, ConsumeResponse,
              EvaluateBatchRequest, EvaluateBatchResponse,
              BulkRevokeRequest, BulkRevokeResponse,
          )
          '

      - name: Publish to PyPI (trusted publisher, OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/atlasent_v2_alpha/dist/
