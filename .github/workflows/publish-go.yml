name: Publish Go SDK

on:
  push:
    tags:
      - 'go/v*'

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Run Go tests
        working-directory: go
        run: go test ./...
      - name: Verify module proxy
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#go/}"
          echo "Verifying module at version $VERSION"
          GOPROXY=https://proxy.golang.org go list -m \
            "github.com/atlasent-systems-inc/atlasent-sdk/go@${VERSION}" || true
