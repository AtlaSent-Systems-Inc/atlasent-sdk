name: v2-alpha CI

# v2-alpha sub-packages live under typescript/packages/v2-alpha/ and
# python/atlasent_v2_alpha/. They have their own pyproject.toml /
# package.json / tests, so they're invisible to python-ci.yml and
# typescript-ci.yml (which only test the root v1 packages). Without
# this workflow, PRs touching v2-alpha pass CI even when their tests
# are broken — only the publish workflow catches it on tag push.
#
# Mirrors enforce-ci.yml's per-language structure.

on:
  push:
    branches: [main]
    paths:
      - "typescript/packages/v2-alpha/**"
      - "python/atlasent_v2_alpha/**"
      - "contract/schemas/v2/**"
      - "contract/vectors/**"
      - ".github/workflows/v2-alpha-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "typescript/packages/v2-alpha/**"
      - "python/atlasent_v2_alpha/**"
      - "contract/schemas/v2/**"
      - "contract/vectors/**"
      - ".github/workflows/v2-alpha-ci.yml"

jobs:
  typescript:
    name: TypeScript v2-alpha
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20.x", "22.x"]
    defaults:
      run:
        working-directory: typescript/packages/v2-alpha
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  python:
    name: Python v2-alpha
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: python/atlasent_v2_alpha
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Check formatting with black
        run: black --check .

      - name: Run tests (with coverage)
        run: pytest tests/ -v --cov --cov-report=term --cov-report=xml
