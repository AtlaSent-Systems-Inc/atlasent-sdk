name: Publish @atlasent/enforce to npm

# Triggers only on enforce-v* tags. Tag pattern:
# enforce-vX.Y.Z (e.g. enforce-v0.1.0-alpha.0). Publishes under the
# `alpha` dist-tag so `npm install @atlasent/enforce` (no @version)
# resolves the latest alpha while v0.1.0 GA is in development.
#
# Disjoint from publish-npm.yml (typescript-v*) and
# publish-npm-v2alpha.yml (typescript-v2-alpha-v*) so a single tag
# push only triggers the right publisher.

on:
  push:
    tags:
      - "enforce-v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Run tests before publishing
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20.x", "22.x"]
    defaults:
      run:
        working-directory: typescript/packages/enforce
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: typescript/packages/enforce/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  publish:
    name: Build and publish to npm
    runs-on: ubuntu-latest
    needs: test
    environment: npm-enforce
    # id-token: write is required for `npm publish --provenance`.
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: typescript/packages/enforce
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: typescript/packages/enforce/package-lock.json
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        # GITHUB_REF is refs/tags/enforce-v<version>. Strip the prefix
        # and compare against package.json "version". Refuses to publish
        # if they disagree.
        # Skipped for workflow_dispatch runs (no tag ref).
        if: github.event_name == 'push'
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/enforce-v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)."
            exit 1
          fi
          echo "Tag and package version agree: $PKG_VERSION"

      - name: Build
        run: npm run build

      - name: Inspect tarball contents (dry-run)
        # `npm pack --dry-run` prints the exact file list that would
        # ship to the registry. Logged so a missing `files` entry or
        # accidentally-included secret is visible before publish.
        run: npm pack --dry-run

      - name: Publish (alpha dist-tag, with provenance)
        # `--tag alpha` keeps `npm install @atlasent/enforce` (without
        # an explicit @version) resolving to the latest alpha. The
        # `latest` dist-tag stays unset until v0.1.0 GA.
        run: npm publish --access public --tag alpha --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
