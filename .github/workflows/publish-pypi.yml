name: Publish to PyPI

# Triggers only on Python-prefixed tags so the matching TypeScript
# workflow doesn't also fire on the same push. Release procedure: see
# /RELEASING.md.
on:
  push:
    tags:
      - "python-v*"
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 2.0.0)'
        required: true

permissions:
  contents: read

jobs:
  test:
    name: Run tests before publishing
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    needs: test
    environment: pypi
    # OIDC trusted publishing — no PYPI_TOKEN secret, no long-lived
    # credentials. Configure the trusted publisher once in PyPI:
    # https://pypi.org/manage/account/publishing/
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade build twine "packaging>=24.2"

      - name: Verify tag matches package version
        # GITHUB_REF is refs/tags/python-v<semver>. Strip the prefix and
        # compare against atlasent._version.__version__. Refuses to
        # publish if they disagree — protects against tagging a commit
        # that forgot the version bump.
        #
        # Skipped for workflow_dispatch runs (no tag ref).
        if: github.event_name == 'push'
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/python-v}"
          # Read _version.py directly without importing the full package
          # (avoids needing httpx/pydantic installed at this step)
          PKG_VERSION="$(python -c 'import runpy; print(runpy.run_path("atlasent/_version.py")["__version__"])')"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match atlasent._version.__version__ ($PKG_VERSION)."
            exit 1
          fi
          echo "Tag and package version agree: $PKG_VERSION"

      - name: Verify manual version matches package version
        # For workflow_dispatch runs, verify the supplied version matches
        # the package's _version.py so the caller doesn't accidentally
        # publish a stale version.
        if: github.event_name == 'workflow_dispatch'
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"
          PKG_VERSION="$(python -c 'import runpy; print(runpy.run_path("atlasent/_version.py")["__version__"])')"
          if [ "$INPUT_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Input version ($INPUT_VERSION) does not match atlasent._version.__version__ ($PKG_VERSION)."
            exit 1
          fi
          echo "Input and package version agree: $PKG_VERSION"

      - name: Build distribution packages
        run: python -m build

      - name: Check distribution packages
        run: twine check dist/*

      - name: Smoke-test built wheel
        # Install the freshly-built wheel in a clean venv and verify
        # the package imports cleanly and reports the expected version.
        # Catches MANIFEST.in / packaging regressions before we ship.
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install --upgrade pip
          /tmp/smoke/bin/pip install dist/*.whl
          SMOKE_VERSION="$(/tmp/smoke/bin/python -c 'import atlasent; print(atlasent.__version__)')"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            EXPECTED="${{ github.event.inputs.version }}"
          else
            EXPECTED="${GITHUB_REF#refs/tags/python-v}"
          fi
          if [ "$SMOKE_VERSION" != "$EXPECTED" ]; then
            echo "::error::Installed wheel reports $SMOKE_VERSION, expected $EXPECTED."
            exit 1
          fi
          /tmp/smoke/bin/python -c 'from atlasent import protect, authorize, AtlaSentClient, AsyncAtlaSentClient, AtlaSentError, AtlaSentDeniedError'

      - name: Publish to PyPI (trusted publisher, OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/
          # PEP 740 attestations are generated and uploaded by default.
