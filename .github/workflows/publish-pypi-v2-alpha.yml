name: Publish atlasent-v2-alpha to PyPI

# Triggers only on python-v2-alpha-prefixed tags so the v1 PyPI
# workflow doesn't also fire on the same push. Tag pattern:
# python-v2-alpha-vX.Y.Z (e.g. python-v2-alpha-v2.0.0a0). Release
# procedure: see /RELEASING.md.
on:
  push:
    tags:
      - "python-v2-alpha-v*"

permissions:
  contents: read

jobs:
  test:
    name: Run tests before publishing
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: python/atlasent_v2_alpha
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    needs: test
    environment: pypi-v2-alpha
    # OIDC trusted publishing — no PYPI_TOKEN secret. Configure the
    # trusted publisher in PyPI for the `atlasent-v2-alpha` project:
    # https://pypi.org/manage/account/publishing/
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: python/atlasent_v2_alpha
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade build twine "packaging>=24.2"

      - name: Verify tag matches package version
        # GITHUB_REF is refs/tags/python-v2-alpha-v<version>. Strip the
        # prefix and compare against atlasent_v2_alpha.__version__.
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/python-v2-alpha-v}"
          PKG_VERSION="$(python -c 'import runpy; m = runpy.run_path("atlasent_v2_alpha/__init__.py"); print(m["__version__"])')"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match atlasent_v2_alpha.__version__ ($PKG_VERSION)."
            exit 1
          fi
          echo "Tag and package version agree: $PKG_VERSION"

      - name: Build distribution packages
        run: python -m build

      - name: Check distribution packages
        run: twine check dist/*

      - name: Smoke-test built wheel
        # Install the freshly-built wheel in a clean venv and verify
        # the package imports cleanly and reports the expected version.
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install --upgrade pip
          /tmp/smoke/bin/pip install dist/*.whl
          SMOKE_VERSION="$(/tmp/smoke/bin/python -c 'import atlasent_v2_alpha; print(atlasent_v2_alpha.__version__)')"
          EXPECTED="${GITHUB_REF#refs/tags/python-v2-alpha-v}"
          if [ "$SMOKE_VERSION" != "$EXPECTED" ]; then
            echo "::error::Installed wheel reports $SMOKE_VERSION, expected $EXPECTED."
            exit 1
          fi
          /tmp/smoke/bin/python -c 'from atlasent_v2_alpha import AtlaSentV2Client, V2Error, canonicalize_payload, hash_payload, parse_sse_lines, DecisionEvent, EvaluateBatchResponse, ConsumeResponse, ProofVerificationResult'

      - name: Publish to PyPI (trusted publisher, OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/atlasent_v2_alpha/dist/
