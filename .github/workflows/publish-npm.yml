name: Publish to npm

# Triggers only on TypeScript-prefixed tags so the matching PyPI
# workflow doesn't also fire on the same push. Release procedure: see
# /RELEASING.md.
on:
  push:
    tags:
      - "typescript-v*"
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 2.0.0)'
        required: true

permissions:
  contents: read

jobs:
  test:
    name: Run tests before publishing
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20.x", "22.x"]
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: typescript/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  publish:
    name: Build and publish to npm
    runs-on: ubuntu-latest
    needs: test
    environment: npm
    # id-token: write is required for `npm publish --provenance`
    # (Sigstore attestation linking the tarball to this workflow run).
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: typescript/package-lock.json
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        # GITHUB_REF is refs/tags/typescript-v<semver>. Strip the prefix
        # and compare against package.json "version". Refuses to publish
        # if they disagree — protects against tagging a commit that
        # forgot the version bump.
        #
        # Skipped for workflow_dispatch runs (no tag ref).
        if: github.event_name == 'push'
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/typescript-v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)."
            exit 1
          fi
          echo "Tag and package version agree: $PKG_VERSION"

      - name: Verify manual version matches package version
        # For workflow_dispatch runs, verify the supplied version matches
        # package.json so the caller doesn't accidentally publish a stale version.
        if: github.event_name == 'workflow_dispatch'
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$INPUT_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Input version ($INPUT_VERSION) does not match package.json version ($PKG_VERSION)."
            exit 1
          fi
          echo "Input and package version agree: $PKG_VERSION"

      - name: Build
        run: npm run build

      - name: Inspect tarball contents (dry-run)
        # `npm pack --dry-run` prints the exact file list that would
        # ship to the registry. Logged in CI so a missing `files` entry
        # or accidentally-included secret is visible in the Actions log
        # before we push to npm.
        run: npm pack --dry-run

      - name: Publish (with provenance)
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
