name: Publish @atlasent/sdk-v2-alpha to npm

# Triggers only on typescript-v2-alpha-prefixed tags. Tag pattern:
# typescript-v2-alpha-vX.Y.Z (e.g. typescript-v2-alpha-v2.0.0-alpha.0).
# Publishes under the `alpha` dist-tag so `npm install
# @atlasent/sdk-v2-alpha` resolves the latest alpha without anyone
# explicitly opting in.
on:
  push:
    tags:
      - "typescript-v2-alpha-v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Run tests before publishing
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20.x", "22.x"]
    defaults:
      run:
        working-directory: typescript/packages/v2-alpha
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  publish:
    name: Build and publish to npm
    runs-on: ubuntu-latest
    needs: test
    environment: npm-v2-alpha
    # id-token: write is required for `npm publish --provenance`.
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: typescript/packages/v2-alpha
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm install

      - name: Verify tag matches package version
        # GITHUB_REF is refs/tags/typescript-v2-alpha-v<version>. Strip
        # the prefix and compare against package.json "version".
        # Skipped for workflow_dispatch runs (no tag ref).
        if: github.event_name == 'push'
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/typescript-v2-alpha-v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)."
            exit 1
          fi
          echo "Tag and package version agree: $PKG_VERSION"

      - name: Build
        run: npm run build

      - name: Inspect tarball contents (dry-run)
        # `npm pack --dry-run` prints the exact file list that would
        # ship to the registry. Logged so a missing `files` entry or
        # accidentally-included secret is visible before publish.
        run: npm pack --dry-run

      - name: Publish (alpha dist-tag, with provenance)
        # `--tag alpha` keeps `npm install @atlasent/sdk-v2-alpha`
        # without an explicit `@<version>` resolving to the latest
        # alpha. The `latest` dist-tag stays unset until v2 GA.
        run: npm publish --access public --tag alpha --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
