name: Integration (staging)

# Hits the staging AtlaSent API end-to-end. Gated on a repo-level
# secret: if `STAGING_ATLASENT_API_KEY` is absent, every job is a
# no-op success. This lets fork PRs and first-time contributors open
# PRs without CI red, while still running the suite on the trunk and
# on maintainer PRs once the secret is configured.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly at 03:17 UTC so staging drift surfaces before the
    # European workday.
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gate:
    name: Check if staging key is configured
    runs-on: ubuntu-latest
    # Block fork PRs from probing for the staging secret; only run the
    # gate (and downstream jobs) when the workflow is on the trunk repo.
    if: github.repository == 'AtlaSent-Systems-Inc/atlasent-sdk'
    outputs:
      has_key: ${{ steps.check.outputs.has_key }}
    steps:
      - id: check
        env:
          STAGING_ATLASENT_API_KEY: ${{ secrets.STAGING_ATLASENT_API_KEY }}
        run: |
          if [ -n "$STAGING_ATLASENT_API_KEY" ]; then
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=false" >> "$GITHUB_OUTPUT"
            echo "::notice::STAGING_ATLASENT_API_KEY not set — skipping integration suite."
          fi

  python:
    name: Python integration (staging)
    needs: gate
    if: needs.gate.outputs.has_key == 'true' && github.repository == 'AtlaSent-Systems-Inc/atlasent-sdk'
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run integration suite
        env:
          ATLASENT_API_KEY: ${{ secrets.STAGING_ATLASENT_API_KEY }}
          ATLASENT_BASE_URL: ${{ vars.STAGING_ATLASENT_BASE_URL || 'https://staging.atlasent.io' }}
        run: pytest tests/integration/ -v -m "integration"

  typescript:
    name: TypeScript integration (staging)
    needs: gate
    if: needs.gate.outputs.has_key == 'true' && github.repository == 'AtlaSent-Systems-Inc/atlasent-sdk'
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: typescript/package-lock.json

      - name: Install
        run: npm ci

      - name: Run integration suite
        env:
          ATLASENT_API_KEY: ${{ secrets.STAGING_ATLASENT_API_KEY }}
          ATLASENT_BASE_URL: ${{ vars.STAGING_ATLASENT_BASE_URL || 'https://staging.atlasent.io' }}
        run: npm run test:integration
