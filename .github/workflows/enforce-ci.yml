name: Enforce CI

# Runs on any change touching the enforce packages, their shared JSON
# fixtures, the bypass-lint scripts, or this workflow file.

on:
  push:
    branches: [main]
    paths:
      - "typescript/packages/enforce/**"
      - "python/atlasent_enforce/**"
      - "contract/scenarios/**"
      - "scripts/enforce-no-bypass*"
      - "scripts/enforce_no_bypass*"
      - ".github/workflows/enforce-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "typescript/packages/enforce/**"
      - "python/atlasent_enforce/**"
      - "contract/scenarios/**"
      - "scripts/enforce-no-bypass*"
      - "scripts/enforce_no_bypass*"
      - ".github/workflows/enforce-ci.yml"

permissions:
  contents: read

jobs:
  # ── TypeScript @atlasent/enforce ─────────────────────────────────────────
  ts-enforce:
    name: "TS enforce / Node ${{ matrix.node-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20.x", "22.x"]
    defaults:
      run:
        working-directory: typescript/packages/enforce

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: typescript/packages/enforce/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: SIM-01..SIM-10 + smoke tests
        run: npm test

      - name: Build
        run: npm run build

  # ── Python atlasent-enforce ───────────────────────────────────────────────
  py-enforce:
    name: "Python enforce / ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: python/atlasent_enforce

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check atlasent_enforce/

      - name: SIM-01..SIM-10 + smoke tests
        run: pytest tests/ -v

  # ── enforce-no-bypass static lint ────────────────────────────────────────
  no-bypass-lint:
    name: enforce-no-bypass lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"

      - name: Lint TypeScript enforce source (no direct evaluate() calls)
        run: |
          node scripts/enforce-no-bypass.mjs \
            typescript/packages/enforce/src/enforce.ts \
            typescript/packages/enforce/src/errors.ts \
            typescript/packages/enforce/src/types.ts \
            typescript/packages/enforce/src/index.ts

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Lint Python enforce source (no direct evaluate() calls)
        run: |
          python scripts/enforce_no_bypass.py \
            python/atlasent_enforce/atlasent_enforce/_enforce.py \
            python/atlasent_enforce/atlasent_enforce/types.py \
            python/atlasent_enforce/atlasent_enforce/errors.py \
            python/atlasent_enforce/atlasent_enforce/__init__.py

      - name: SIM-10 — confirm bypass fixture is caught
        run: |
          ! node scripts/enforce-no-bypass.mjs \
            contract/scenarios/SIM-10-bypass-fixture.ts
          ! python scripts/enforce_no_bypass.py \
            contract/scenarios/SIM-10-bypass-fixture.py
